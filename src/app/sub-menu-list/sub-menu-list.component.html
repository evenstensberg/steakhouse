@for (menuItem of arr; track menuItem; let i = $index) {
  <div class="add-container">
    <p>{{ i + 1 }}. {{ menuItem.title }} &nbsp;</p>
    @if (menuItem.allergies && menuItem.allergies.length) {
      <p>
        ({{ menuItem.allergies }})&nbsp;
      </p>
    }
    @if (menuItem.popular) {
      <span
        [ngStyle]="{ 'margin-left': '1em' }"
        class="badge bg-primary"
        >Populær</span
        >
      }
      <span class="add-item-price"
        >kr.<b> {{ menuItem.price }},-</b></span
        >
      </div>
    }
