@for (item of arr; track item; let i = $index) {
  <div class="single-menu-item">
    <span>{{ i + 1 }}. {{ item.title }} - </span>
    @if (item.popular) {
      <span
        [ngStyle]="{ 'margin-left': '1em' }"
        class="badge bg-primary"
        >Populær</span
        >
      }
      <span class="menu-item-price"
        >kr.<b>{{ item.price }},-</b></span
        >
      </div>
    }
