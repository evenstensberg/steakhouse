@if (images.length) {
  <ngb-carousel
    class="slider"
    [interval]="5000"
    [pauseOnHover]="true"
    [pauseOnFocus]="true"
    [wrap]="true"
    [keyboard]="true"
    [showNavigationArrows]="true"
    [showNavigationIndicators]="true"
    >
    @for (img of images; track img; let i = $index) {
      <ng-template ngbSlide>
        <div class="picsum-img-wrapper">
          <img
            [src]="img.url"
            [alt]="img.alt"
            loading="lazy"
            decoding="async"
            />
        </div>
      </ng-template>
    }
  </ngb-carousel>
}
